name: Sort Submissions

on:
  workflow_run:
    workflows: ["Sync DSA"]
    types:
      - completed

jobs:
  sort:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Sort SQL and DSA files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          for folder in DSA/*/; do
            if find "$folder" -name "*.sql" | grep -q .; then
              problem=$(basename "$folder")
              mv "$folder" "SQL/$problem"
              echo "Moved $problem to SQL/"
            fi
          done

          find DSA -empty -type d -delete

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Auto-sort: moved SQL problem folders to SQL/"
            git push
          else
            echo "Nothing to sort"
          fi
